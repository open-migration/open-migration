<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #18181f;
  --surface3: #1e1e28;
  --border: #2a2a38;
  --border2: #333344;
  --text: #e0e0ef;
  --text2: #9090a8;
  --text3: #5a5a72;
  --accent: #7c6af7;
  --accent2: #5b4de0;
  --accent-glow: rgba(124,106,247,0.15);
  --user-bg: #1a1a2e;
  --user-border: #2a2a4e;
  --ai-bg: #0f1a1a;
  --ai-border: #1a2f2f;
  --sys-bg: #1a1a14;
  --sys-border: #2f2f1a;
  --green: #4ade80;
  --blue: #60a5fa;
  --purple: #c084fc;
  --orange: #fb923c;
  --red: #f87171;
  --radius: 10px;
  --sidebar-w: 320px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  line-height: 1.6;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Top bar ── */
#topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 20px;
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}
#topbar .logo {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}
#topbar .logo span {
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
#search-wrap {
  flex: 1;
  max-width: 480px;
  position: relative;
}
#search {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.9rem;
  padding: 8px 14px 8px 36px;
  outline: none;
  transition: border-color 0.2s;
}
#search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
#search::placeholder { color: var(--text3); }
.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 0.85rem;
  pointer-events: none;
}
#topbar .stats-pill {
  font-size: 0.78rem;
  color: var(--text2);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 4px 12px;
  white-space: nowrap;
}

/* ── Layout ── */
#layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidebar-filters {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.filter-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 100px;
  padding: 4px 12px;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-btn:hover, .filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
#conv-count {
  padding: 8px 12px;
  font-size: 0.75rem;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
}
#conv-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}
#conv-list::-webkit-scrollbar { width: 4px; }
#conv-list::-webkit-scrollbar-track { background: transparent; }
#conv-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.conv-item {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}
.conv-item:hover { background: var(--surface2); }
.conv-item.active { background: var(--surface3); }
.conv-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}
.conv-title {
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.conv-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.72rem;
  color: var(--text3);
}
.conv-source {
  font-size: 0.7rem;
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 1px 6px;
  color: var(--text2);
}

/* ── Main content ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}
#conv-header {
  padding: 20px 28px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#conv-header h1 {
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.3;
}
#conv-header .meta-row {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.78rem;
  color: var(--text2);
}
.meta-badge {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 0.72rem;
  color: var(--text2);
}
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 28px;
}
#messages::-webkit-scrollbar { width: 5px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.message {
  margin-bottom: 20px;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid transparent;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

.message.user { background: var(--user-bg); border-color: var(--user-border); }
.message.assistant { background: var(--ai-bg); border-color: var(--ai-border); }
.message.system { background: var(--sys-bg); border-color: var(--sys-border); opacity: 0.7; }

.msg-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 0.78rem;
  font-weight: 600;
}
.msg-header .role {
  display: flex;
  align-items: center;
  gap: 5px;
}
.role-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.message.user .role-dot { background: var(--blue); }
.message.assistant .role-dot { background: var(--green); }
.message.system .role-dot { background: var(--orange); }
.message.user .msg-header { color: #93c5fd; }
.message.assistant .msg-header { color: #86efac; }
.message.system .msg-header { color: #fbbf24; }
.msg-time { margin-left: auto; color: var(--text3); font-weight: 400; font-size: 0.72rem; }

.msg-body {
  padding: 14px 16px;
  font-size: 0.88rem;
  line-height: 1.7;
  color: var(--text);
}
.msg-body p { margin-bottom: 8px; }
.msg-body p:last-child { margin-bottom: 0; }
.msg-body h2, .msg-body h3, .msg-body h4 {
  margin: 14px 0 8px;
  color: var(--text);
  font-weight: 600;
}
.msg-body ul { margin: 8px 0 8px 20px; }
.msg-body li { margin-bottom: 4px; }
.msg-body hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.msg-body br { display: block; content: ''; margin-bottom: 4px; }
.msg-body strong { color: var(--text); font-weight: 600; }
.msg-body em { color: var(--text2); font-style: italic; }
.msg-body a { color: var(--accent); text-decoration: none; }
.msg-body a:hover { text-decoration: underline; }

.code-block {
  margin: 10px 0;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border2);
  background: #0d0d18;
  position: relative;
}
.code-block pre {
  padding: 14px 16px;
  overflow-x: auto;
  font-size: 0.82rem;
  line-height: 1.5;
  font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', 'Courier New', monospace;
}
.code-block pre::-webkit-scrollbar { height: 3px; }
.code-block pre::-webkit-scrollbar-thumb { background: var(--border2); }
.code-lang {
  display: block;
  padding: 5px 14px;
  font-size: 0.7rem;
  font-family: monospace;
  color: var(--accent);
  background: rgba(124,106,247,0.08);
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.inline-code {
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 1px 5px;
  font-family: 'Fira Code', 'Cascadia Code', monospace;
  font-size: 0.82em;
  color: #c4b5fd;
}

.attachment-list {
  margin: 10px 0 0;
  padding: 10px 14px;
  background: var(--surface3);
  border-radius: 6px;
  border: 1px solid var(--border2);
}
.attachment-list p { margin-bottom: 5px; font-size: 0.78rem; color: var(--text3); font-weight: 600; }
.attachment-list span {
  display: inline-block;
  margin: 2px 4px 2px 0;
  padding: 2px 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 0.72rem;
  color: var(--text2);
}

/* ── Empty / welcome state ── */
#welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  padding: 40px;
  text-align: center;
}
#welcome .big-icon { font-size: 3rem; margin-bottom: 16px; }
#welcome h2 { font-size: 1.3rem; color: var(--text); margin-bottom: 8px; font-weight: 600; }
#welcome p { font-size: 0.88rem; color: var(--text2); max-width: 360px; line-height: 1.6; }

/* ── Stats dashboard ── */
#stats-bar {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  overflow-x: auto;
}
.stat-card {
  padding: 12px 24px;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
}
.stat-card .val {
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
  margin-bottom: 3px;
  font-variant-numeric: tabular-nums;
}
.stat-card .lbl {
  font-size: 0.7rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ── No results ── */
#no-results {
  padding: 32px;
  text-align: center;
  color: var(--text3);
  font-size: 0.88rem;
}

/* ── Scrollbar global ── */
* { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }

@media (max-width: 700px) {
  :root { --sidebar-w: 100vw; }
  #layout { flex-direction: column; }
  #sidebar { width: 100%; height: 220px; }
  body { overflow: auto; }
}
</style>

<script>
const RAW = {"nodes": [{"id": "ff56698c57535f4a401ffaa1", "type": "conversation", "title": "How to center a div in CSS", "body": "", "created_at": "2024-06-01T00:00:00+00:00", "updated_at": "2024-06-01T00:05:00+00:00", "source": "chatgpt", "source_id": "example-conv-001", "metadata": {"conversation_index": 0}, "attachments": []}, {"id": "9a83f3b26eed288f70b410bf", "type": "message", "title": "user message", "body": "How do I center a div in CSS? I've tried margin: auto but it only works horizontally.", "created_at": "2024-06-01T00:00:01+00:00", "updated_at": null, "source": "chatgpt", "source_id": "msg-002", "metadata": {"role": "user", "status": "finished_successfully"}, "attachments": []}, {"id": "5e2876a6db042c01a35e249a", "type": "message", "title": "assistant message", "body": "Great question! `margin: auto` only centers horizontally because block elements don't have automatic vertical margins.\n\nThe modern approach is **Flexbox**:\n\n```css\n.parent {\n  display: flex;\n  justify-content: center; /* horizontal */\n  align-items: center;     /* vertical */\n  height: 100vh;           /* parent needs a height */\n}\n```\n\nOr **CSS Grid** (even simpler):\n\n```css\n.parent {\n  display: grid;\n  place-items: center;\n  height: 100vh;\n}\n```\n\nBoth methods work in all modern browsers (Chrome, Firefox, Safari, Edge). Flexbox gives you more control for complex layouts; Grid is the most concise for simple centering.", "created_at": "2024-06-01T00:01:00+00:00", "updated_at": null, "source": "chatgpt", "source_id": "msg-003", "metadata": {"role": "assistant", "status": "finished_successfully"}, "attachments": []}, {"id": "1fedb0c4aef5b5d6f27fcb33", "type": "conversation", "title": "Python list comprehension vs for loop performance", "body": "", "created_at": "2024-05-30T20:13:20+00:00", "updated_at": "2024-05-30T20:26:40+00:00", "source": "chatgpt", "source_id": "example-conv-002", "metadata": {"conversation_index": 1}, "attachments": []}, {"id": "fcf184d0e749647c7edcdea3", "type": "message", "title": "user message", "body": "Is a list comprehension faster than a for loop in Python?", "created_at": "2024-05-30T20:13:21+00:00", "updated_at": null, "source": "chatgpt", "source_id": "msg-b02", "metadata": {"role": "user", "status": "finished_successfully"}, "attachments": []}, {"id": "f0db9bc6efc2a74993bd711e", "type": "message", "title": "assistant message", "body": "Yes — list comprehensions are typically **20-35% faster** than equivalent for loops in CPython.\n\n**Why?**\n\nList comprehensions are optimised at the bytecode level. They use `LIST_APPEND` which is faster than calling `.append()` in a loop (avoids repeated attribute lookup).\n\n**Benchmark:**\n\n```python\nimport timeit\n\n# For loop\ndef with_loop(n):\n    result = []\n    for i in range(n):\n        result.append(i * 2)\n    return result\n\n# List comprehension\ndef with_comp(n):\n    return [i * 2 for i in range(n)]\n\nprint(timeit.timeit(lambda: with_loop(10000), number=1000))\nprint(timeit.timeit(lambda: with_comp(10000), number=1000))\n```\n\nTypical results: loop ~0.8s, comprehension ~0.55s for 10k elements × 1000 runs.\n\n**When to use which:**\n- Simple transformations → list comprehension\n- Complex multi-step logic → for loop (readability > micro-optimisation)\n- Memory concern → generator expression `(x for x in ...)` instead", "created_at": "2024-05-30T20:14:20+00:00", "updated_at": null, "source": "chatgpt", "source_id": "msg-b03", "metadata": {"role": "assistant", "status": "finished_successfully"}, "attachments": []}, {"id": "0f269bff95b5937e3985b578", "type": "message", "title": "user message", "body": "What about generator expressions vs list comprehensions?", "created_at": "2024-05-30T20:20:00+00:00", "updated_at": null, "source": "chatgpt", "source_id": "msg-b04", "metadata": {"role": "user", "status": "finished_successfully"}, "attachments": []}, {"id": "d36509c070f302e18ac58f16", "type": "conversation", "title": "Designing a REST API for a task manager", "body": "", "created_at": "2024-06-01T09:00:00.000000+00:00", "updated_at": "2024-06-01T09:12:00.000000+00:00", "source": "claude", "source_id": "example-claude-conv-001", "metadata": {"conversation_index": 0}, "attachments": []}, {"id": "635f9cad8d45fa163c5ab07b", "type": "message", "title": "human message", "body": "I'm building a task manager app. Can you help me design a clean REST API? I want to support tasks, projects, and users.", "created_at": "2024-06-01T09:00:00.000000+00:00", "updated_at": null, "source": "claude", "source_id": "msg-001", "metadata": {"role": "human", "created_at": "2024-06-01T09:00:00.000000+00:00"}, "attachments": []}, {"id": "584947f633cdeafb3aba5945", "type": "message", "title": "assistant message", "body": "Happy to help design this! Here's a clean REST API structure:\n\n## Resources\n\n```\nGET    /api/users/{id}\nPOST   /api/users\n\nGET    /api/projects\nPOST   /api/projects\nGET    /api/projects/{id}\nPUT    /api/projects/{id}\nDELETE /api/projects/{id}\n\nGET    /api/projects/{id}/tasks\nPOST   /api/projects/{id}/tasks\nGET    /api/tasks/{id}\nPUT    /api/tasks/{id}\nPATCH  /api/tasks/{id}\nDELETE /api/tasks/{id}\n```\n\n## Task schema\n\n```json\n{\n  \"id\": \"task_abc123\",\n  \"title\": \"Write API documentation\",\n  \"description\": \"Document all endpoints with examples\",\n  \"status\": \"in_progress\",\n  \"priority\": \"high\",\n  \"project_id\": \"proj_xyz\",\n  \"assignee_id\": \"user_123\",\n  \"due_date\": \"2024-06-15T23:59:59Z\",\n  \"created_at\": \"2024-06-01T09:00:00Z\",\n  \"updated_at\": \"2024-06-01T09:00:00Z\"\n}\n```\n\n## Key decisions\n\n**Use PATCH for partial updates** — `PUT` replaces the entire resource, `PATCH` updates only the fields you send. For tasks you'll mostly want PATCH (toggle status, update title, etc.).\n\n**Nest tasks under projects** for listing — `/api/projects/{id}/tasks` makes it easy to get all tasks in a project. But `/api/tasks/{id}` for individual task operations keeps URLs short.\n\n**Consistent error format:**\n```json\n{\n  \"error\": {\n    \"code\": \"TASK_NOT_FOUND\",\n    \"message\": \"Task task_abc123 not found\",\n    \"status\": 404\n  }\n}\n```\n\nWant me to go deeper on authentication, pagination, or filtering?", "created_at": "2024-06-01T09:01:30.000000+00:00", "updated_at": null, "source": "claude", "source_id": "msg-002", "metadata": {"role": "assistant", "created_at": "2024-06-01T09:01:30.000000+00:00"}, "attachments": []}, {"id": "68188fbed46e7190a778e924", "type": "message", "title": "human message", "body": "Yes, how should I handle pagination?", "created_at": "2024-06-01T09:10:00.000000+00:00", "updated_at": null, "source": "claude", "source_id": "msg-003", "metadata": {"role": "human", "created_at": "2024-06-01T09:10:00.000000+00:00"}, "attachments": []}, {"id": "233be2dc58cfb831d6ad3107", "type": "message", "title": "assistant message", "body": "Use **cursor-based pagination** for tasks — it handles real-time updates (new items being added) much better than offset pagination.\n\n```\nGET /api/projects/{id}/tasks?limit=20&cursor=task_xyz789\n```\n\nResponse:\n```json\n{\n  \"data\": [...],\n  \"pagination\": {\n    \"cursor\": \"task_abc123\",\n    \"has_more\": true,\n    \"total\": 847\n  }\n}\n```\n\nThe `cursor` is the ID of the last item returned. To get the next page, pass it back as `?cursor=task_abc123`.\n\n**Why not offset?** If someone adds 5 tasks while a user is paginating, offset pagination skips items. Cursor pagination doesn't.\n\nFor the initial load (no cursor), just return the first N items sorted by `created_at DESC`.", "created_at": "2024-06-01T09:11:45.000000+00:00", "updated_at": null, "source": "claude", "source_id": "msg-004", "metadata": {"role": "assistant", "created_at": "2024-06-01T09:11:45.000000+00:00"}, "attachments": []}], "edges": [{"id": "6922d676c46ccfe732f6eaf6", "type": "contains", "from_id": "ff56698c57535f4a401ffaa1", "to_id": "9a83f3b26eed288f70b410bf", "metadata": {"order": 0}}, {"id": "8cc7a90efe5a2e54fbbd02e3", "type": "contains", "from_id": "ff56698c57535f4a401ffaa1", "to_id": "5e2876a6db042c01a35e249a", "metadata": {"order": 1}}, {"id": "715f1d9c36deeda944b1509c", "type": "next", "from_id": "9a83f3b26eed288f70b410bf", "to_id": "5e2876a6db042c01a35e249a", "metadata": {"order": 1}}, {"id": "e8042e429bad7ed5b8411cc0", "type": "contains", "from_id": "1fedb0c4aef5b5d6f27fcb33", "to_id": "fcf184d0e749647c7edcdea3", "metadata": {"order": 0}}, {"id": "3dac90a13dff0a4aa3689cfe", "type": "contains", "from_id": "1fedb0c4aef5b5d6f27fcb33", "to_id": "f0db9bc6efc2a74993bd711e", "metadata": {"order": 1}}, {"id": "861d382385201ef7cae2cd98", "type": "next", "from_id": "fcf184d0e749647c7edcdea3", "to_id": "f0db9bc6efc2a74993bd711e", "metadata": {"order": 1}}, {"id": "5ca934770da44c8051c31f14", "type": "contains", "from_id": "1fedb0c4aef5b5d6f27fcb33", "to_id": "0f269bff95b5937e3985b578", "metadata": {"order": 2}}, {"id": "88cff96b629cf8abd0f8031f", "type": "next", "from_id": "f0db9bc6efc2a74993bd711e", "to_id": "0f269bff95b5937e3985b578", "metadata": {"order": 2}}, {"id": "33d215dd31b795eb3ad9f28e", "type": "contains", "from_id": "d36509c070f302e18ac58f16", "to_id": "635f9cad8d45fa163c5ab07b", "metadata": {"order": 0}}, {"id": "e6019e8541a5d809f3ce4e78", "type": "contains", "from_id": "d36509c070f302e18ac58f16", "to_id": "584947f633cdeafb3aba5945", "metadata": {"order": 1}}, {"id": "ed72a777ab98529e03ab5d42", "type": "next", "from_id": "635f9cad8d45fa163c5ab07b", "to_id": "584947f633cdeafb3aba5945", "metadata": {"order": 1}}, {"id": "fc53b611c807aaa320017c6a", "type": "contains", "from_id": "d36509c070f302e18ac58f16", "to_id": "68188fbed46e7190a778e924", "metadata": {"order": 2}}, {"id": "76e81f42d2c619fc45e4f932", "type": "next", "from_id": "584947f633cdeafb3aba5945", "to_id": "68188fbed46e7190a778e924", "metadata": {"order": 2}}, {"id": "3f37a5f39f69d11b4e34b5ec", "type": "contains", "from_id": "d36509c070f302e18ac58f16", "to_id": "233be2dc58cfb831d6ad3107", "metadata": {"order": 3}}, {"id": "46d4f17e844c9239e26ae4c2", "type": "next", "from_id": "68188fbed46e7190a778e924", "to_id": "233be2dc58cfb831d6ad3107", "metadata": {"order": 3}}]};
const STATS = {"total_conversations": 3, "total_messages": 9, "total_words": 533, "total_chars": 3963, "sources": {"chatgpt": 2, "claude": 1}, "date_range": ["2024-05-30T20:13:20+00:00", "2024-06-01T09:00:00.000000+00:00"], "avg_messages_per_conv": 3.0, "longest_conversation": "Designing a REST API for a task manager"};

// ── Format numbers ──────────────────────────────────────────────────────────
function fmt(n) {
  if (n >= 1_000_000) return (n/1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n/1_000).toFixed(1) + 'K';
  return String(n);
}

function fmtDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});
  } catch(e) { return iso.slice(0,10); }
}

function fmtDateLong(iso) {
  if (!iso) return 'Unknown date';
  try {
    const d = new Date(iso);
    return d.toLocaleString('en-US', {
      month: 'long', day: 'numeric', year: 'numeric',
      hour: 'numeric', minute: '2-digit', timeZoneName: 'short'
    });
  } catch(e) { return iso; }
}

// ── Populate stats bar ──────────────────────────────────────────────────────
(function() {
  document.getElementById('s-convs').textContent = fmt(STATS.total_conversations);
  document.getElementById('s-msgs').textContent = fmt(STATS.total_messages);
  document.getElementById('s-words').textContent = fmt(STATS.total_words);
  const sources = Object.keys(STATS.sources || {}).join(', ') || '—';
  document.getElementById('s-sources').textContent = sources;
  const dr = STATS.date_range || [];
  const drText = (dr[0] && dr[1]) ? fmtDate(dr[0]) + ' – ' + fmtDate(dr[1]) : '—';
  document.getElementById('s-daterange').textContent = drText;
  document.getElementById('topbar-pill').textContent =
    `${STATS.total_conversations} convs · ${fmt(STATS.total_words)} words`;
})();

// ── Build conversation index ────────────────────────────────────────────────
const nodeMap = {};
RAW.nodes.forEach(n => nodeMap[n.id] = n);

const edgesByParent = {};  // from_id → [{to_id, order, type}]
RAW.edges.forEach(e => {
  if (!edgesByParent[e.from_id]) edgesByParent[e.from_id] = [];
  edgesByParent[e.from_id].push(e);
});

function getChildren(parentId, edgeType) {
  const edges = (edgesByParent[parentId] || [])
    .filter(e => !edgeType || e.type === edgeType)
    .sort((a,b) => (a.metadata.order||0) - (b.metadata.order||0));
  return edges.map(e => nodeMap[e.to_id]).filter(Boolean);
}

const conversations = RAW.nodes
  .filter(n => n.type === 'conversation')
  .sort((a,b) => {
    const da = a.created_at || ''; const db = b.created_at || '';
    return db.localeCompare(da);
  });

// ── Filter state ─────────────────────────────────────────────────────────────
let activeSource = 'all';
let searchQuery = '';
let activeConvId = null;

// ── Sidebar filters ──────────────────────────────────────────────────────────
const sources = ['all', ...new Set(conversations.map(c => c.source).filter(Boolean))];
const filterWrap = document.getElementById('sidebar-filters');
sources.forEach(src => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (src === 'all' ? ' active' : '');
  const icons = {chatgpt:'🤖', claude:'⚡', gemini:'✨', all:'💬'};
  btn.textContent = (icons[src] || '💬') + ' ' + (src === 'all' ? 'All' : src.charAt(0).toUpperCase() + src.slice(1));
  btn.dataset.src = src;
  btn.addEventListener('click', () => {
    activeSource = src;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.src === src));
    renderList();
  });
  filterWrap.appendChild(btn);
});

// ── Search ───────────────────────────────────────────────────────────────────
const searchEl = document.getElementById('search');
let searchTimer;
searchEl.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = searchEl.value.toLowerCase().trim();
    renderList();
  }, 180);
});

// ── List rendering ────────────────────────────────────────────────────────────
function scoreConv(conv) {
  if (!searchQuery) return true;
  const title = (conv.title || '').toLowerCase();
  if (title.includes(searchQuery)) return true;
  const msgs = getChildren(conv.id, 'contains');
  return msgs.some(m => (m.body || '').toLowerCase().includes(searchQuery));
}

function renderList() {
  const list = document.getElementById('conv-list');
  const countEl = document.getElementById('conv-count');
  list.innerHTML = '';
  const filtered = conversations.filter(c => {
    if (activeSource !== 'all' && c.source !== activeSource) return false;
    return scoreConv(c);
  });
  countEl.textContent = filtered.length === conversations.length
    ? `${conversations.length} conversations`
    : `${filtered.length} of ${conversations.length} conversations`;

  if (filtered.length === 0) {
    list.innerHTML = '<div id="no-results">No conversations match your search.</div>';
    return;
  }

  filtered.forEach(conv => {
    const msgs = getChildren(conv.id, 'contains');
    const preview = msgs[0]?.body?.trim().slice(0, 120) || 'No preview';
    const icons = {chatgpt:'🤖', claude:'⚡', gemini:'✨'};
    const icon = icons[conv.source] || '💬';

    const item = document.createElement('div');
    item.className = 'conv-item' + (conv.id === activeConvId ? ' active' : '');
    item.dataset.id = conv.id;
    item.innerHTML = `
      <div class="conv-title">${escHtml(conv.title || 'Untitled')}</div>
      <div class="conv-meta">
        <span class="conv-source">${icon} ${conv.source || 'unknown'}</span>
        <span>${fmtDate(conv.created_at)}</span>
        <span>·</span>
        <span>${msgs.length} msg${msgs.length !== 1 ? 's' : ''}</span>
      </div>
    `;
    item.addEventListener('click', () => openConv(conv.id));
    list.appendChild(item);
  });
}

// ── Conversation viewer ────────────────────────────────────────────────────────
function roleLabel(role) {
  const map = {human:'You',user:'You',assistant:'AI',claude:'AI',model:'AI',system:'System',tool:'Tool'};
  return map[(role||'').toLowerCase()] || (role||'Unknown');
}
function roleClass(role) {
  const r = (role||'').toLowerCase();
  if (['human','user'].includes(r)) return 'user';
  if (['assistant','claude','model'].includes(r)) return 'assistant';
  return 'system';
}

function escHtml(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function openConv(convId) {
  activeConvId = convId;
  const conv = nodeMap[convId];
  if (!conv) return;

  document.querySelectorAll('.conv-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === convId));

  const messages = getChildren(convId, 'contains');
  document.getElementById('welcome').style.display = 'none';
  const view = document.getElementById('conv-view');
  view.style.display = 'flex';

  document.getElementById('conv-title').textContent = conv.title || 'Untitled conversation';

  const icons = {chatgpt:'🤖', claude:'⚡', gemini:'✨'};
  const icon = icons[conv.source] || '💬';
  document.getElementById('conv-meta').innerHTML = `
    <span class="meta-badge">${icon} ${(conv.source||'unknown').charAt(0).toUpperCase()+(conv.source||'').slice(1)}</span>
    <span>${fmtDateLong(conv.created_at)}</span>
    <span class="meta-badge">${messages.length} messages</span>
  `;

  const msgContainer = document.getElementById('messages');
  msgContainer.innerHTML = '';
  messages.forEach(msg => {
    const role = msg.metadata?.role || 'unknown';
    const rc = roleClass(role);
    const rl = roleLabel(role);
    const time = fmtDate(msg.created_at);

    const attachHtml = msg.attachments?.length
      ? `<div class="attachment-list">
          <p>📎 Attachments</p>
          ${msg.attachments.map(a => `<span>${escHtml(a.name)}</span>`).join('')}
        </div>` : '';

    const div = document.createElement('div');
    div.className = `message ${rc}`;
    div.innerHTML = `
      <div class="msg-header">
        <span class="role"><span class="role-dot"></span>${rl}</span>
        ${time ? `<span class="msg-time">${time}</span>` : ''}
      </div>
      <div class="msg-body">
        ${renderBody(msg.body || '')}
        ${attachHtml}
      </div>
    `;
    msgContainer.appendChild(div);
  });
  msgContainer.scrollTop = 0;
}

function renderBody(text) {
  // Very lightweight markdown→HTML
  // Code blocks
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const l = lang ? `<span class="code-lang">${escHtml(lang)}</span>` : '';
    return `<div class="code-block">${l}<pre><code>${escHtml(code.trim())}</code></pre></div>`;
  });
  // Inline code (only outside code blocks)
  text = text.replace(/`([^`\n]+)`/g, (_, c) => `<code class="inline-code">${escHtml(c)}</code>`);
  // Split into lines for paragraph/heading/list handling
  const lines = text.split('\n');
  let html = '';
  let inPre = false;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.includes('<div class="code-block">')) { inPre = true; html += line + '\n'; continue; }
    if (inPre) {
      html += line + '\n';
      if (line.includes('</div>')) inPre = false;
      continue;
    }
    if (line.startsWith('### ')) { html += `<h4>${inlineFormat(escHtml(line.slice(4)))}</h4>`; continue; }
    if (line.startsWith('## ')) { html += `<h3>${inlineFormat(escHtml(line.slice(3)))}</h3>`; continue; }
    if (line.startsWith('# ')) { html += `<h2>${inlineFormat(escHtml(line.slice(2)))}</h2>`; continue; }
    if (/^[-*+] /.test(line)) { html += `<li>${inlineFormat(escHtml(line.slice(2)))}</li>`; continue; }
    if (/^---+$/.test(line.trim())) { html += '<hr>'; continue; }
    if (!line.trim()) { html += '<br>'; continue; }
    html += `<p>${inlineFormat(escHtml(line))}</p>`;
  }
  return html;
}

function inlineFormat(s) {
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/_([^_]+)_/g, '<em>$1</em>');
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}

// ── Init ─────────────────────────────────────────────────────────────────────
renderList();
if (conversations.length > 0) {
  openConv(conversations[0].id);
}
</script>
